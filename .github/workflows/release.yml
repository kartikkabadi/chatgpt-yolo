name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and attest extension archive
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.1.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.0.0
        with:
          node-version: 24
      - run: npm run validate
      - run: npm run package
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version=$(node -p "require('./package.json').version")
          test "$GITHUB_REF_NAME" = "v${version}"
      - name: Build reproducible release archive
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          source_date_epoch=$(git log -1 --format=%ct)
          export TZ=UTC
          find dist/yolo -exec touch -h -d "@${source_date_epoch}" {} +
          cd dist
          find yolo -type f -print0 \
            | LC_ALL=C sort -z \
            | xargs -0 zip -X -q "yolo-v${version}.zip"
          sha256sum "yolo-v${version}.zip" > SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: yolo-extension
          path: |
            dist/yolo-v*.zip
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 30
      - name: Attest build provenance
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4.0.0
        with:
          subject-path: "${{ github.workspace }}/dist/yolo-v*.zip"

  publish:
    name: Publish GitHub release
    needs:
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      attestations: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.1.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: yolo-extension
          path: dist
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" dist/yolo-v*.zip dist/SHA256SUMS --verify-tag --generate-notes
