name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - run: npm run validate
      - run: npm run package
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version=$(node -p "require('./package.json').version")
          test "$GITHUB_REF_NAME" = "v${version}"
      - name: Build reproducible release archive
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          source_date_epoch=$(git log -1 --format=%ct)
          export TZ=UTC
          find dist/yolo -exec touch -h -d "@${source_date_epoch}" {} +
          cd dist
          find yolo -type f -print0 \
            | LC_ALL=C sort -z \
            | xargs -0 zip -X -q "yolo-v${version}.zip"
          sha256sum "yolo-v${version}.zip" > SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: yolo-extension
          path: |
            dist/yolo-v*.zip
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 30
      - name: Attest build provenance
        uses: actions/attest-build-provenance@92c65d2898f1f53cfdc910b962cecff86e7f8fcc # v1.1.4
        with:
          subject-path: "${{ github.workspace }}/dist/yolo-v*.zip"
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/yolo-v*.zip dist/SHA256SUMS --verify-tag --generate-notes
