name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm run validate
      - run: npm run package
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version=$(node -p "require('./package.json').version")
          test "$GITHUB_REF_NAME" = "v${version}"
      - name: Build reproducible release archive
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          source_date_epoch=$(git log -1 --format=%ct)
          export TZ=UTC
          find dist/yolo -exec touch -h -d "@${source_date_epoch}" {} +
          cd dist
          find yolo -type f -print0 \
            | LC_ALL=C sort -z \
            | xargs -0 zip -X -q "yolo-v${version}.zip"
          sha256sum "yolo-v${version}.zip" > SHA256SUMS
      - uses: actions/upload-artifact@v7
        with:
          name: yolo-extension
          path: |
            dist/yolo-v*.zip
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 30
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/yolo-v*.zip dist/SHA256SUMS --verify-tag --generate-notes
