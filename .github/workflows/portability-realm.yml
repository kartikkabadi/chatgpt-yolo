name: Portability realm correction

on:
  push:
    branches:
      - feature/data-portability

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/data-portability
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: |
          set -euo pipefail
          python tools/realm_check.py
          rm tools/realm_check.py .github/workflows/portability-realm.yml
          npm run validate
          npm run package
          rm -rf dist
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Make portable backup validation realm-safe"
          git push origin HEAD:feature/data-portability
