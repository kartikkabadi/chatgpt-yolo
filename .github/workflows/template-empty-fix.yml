name: Template empty-state correction

on:
  push:
    branches:
      - release/v1-open-source

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v1-open-source
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply, validate, and clean the correction
        run: |
          set -euo pipefail
          python tools/apply-template-empty-fix.py
          rm tools/apply-template-empty-fix.py .github/workflows/template-empty-fix.yml
          npm run validate
          npm run package
          rm -rf dist
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Preserve intentionally empty template libraries"
          git push origin HEAD:release/v1-open-source
