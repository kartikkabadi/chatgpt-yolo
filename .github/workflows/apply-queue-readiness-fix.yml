name: Apply queue readiness fix

on:
  push:
    branches:
      - fix/queue-readiness-wakeup
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: fix/queue-readiness-wakeup
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
      - name: Apply focused repair
        run: |
          python3 scripts/adjust-queue-readiness-patch.py
          python3 scripts/apply-queue-readiness-fix.py
          rm -f .queue-fix-trigger
          git add -A
          git diff --cached > /tmp/queue-readiness.patch
      - name: Validate final branch state
        id: validate
        shell: bash
        run: |
          set +e
          git diff --cached --check 2>&1 | tee /tmp/diff-check.log
          diff_status=${PIPESTATUS[0]}
          npm run validate:core 2>&1 | tee /tmp/validation.log
          validation_status=${PIPESTATUS[0]}
          printf 'diff_status=%s\nvalidation_status=%s\n' "$diff_status" "$validation_status" > /tmp/status.txt
          if [ "$diff_status" -ne 0 ] || [ "$validation_status" -ne 0 ]; then
            exit 1
          fi
      - name: Preserve repair diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: queue-readiness-repair-diagnostics
          path: |
            /tmp/queue-readiness.patch
            /tmp/diff-check.log
            /tmp/validation.log
            /tmp/status.txt
          if-no-files-found: error
          retention-days: 3
      - name: Commit repair
        if: steps.validate.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: report queue readiness and wake on cooldown"
          git push origin HEAD:fix/queue-readiness-wakeup
