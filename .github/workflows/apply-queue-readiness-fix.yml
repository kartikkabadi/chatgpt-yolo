name: Apply queue readiness fix

on:
  push:
    branches:
      - fix/queue-readiness-wakeup

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: fix/queue-readiness-wakeup
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
      - name: Apply focused repair
        run: python3 scripts/apply-queue-readiness-fix.py
      - name: Validate final branch state
        run: |
          git diff --check
          npm run validate:core
      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: report queue readiness and wake on cooldown"
          git push origin HEAD:fix/queue-readiness-wakeup
