name: Apply route readiness ordering

on:
  push:
    branches:
      - fix/queue-readiness-wakeup

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: fix/queue-readiness-wakeup
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
      - name: Apply and stage focused fix
        run: |
          python3 scripts/apply-route-readiness-order.py
          rm -f .route-order-trigger
          git checkout HEAD -- .github/workflows/apply-route-readiness-order.yml
          git add -A
          git diff --cached --check
      - name: Validate core
        run: npm run validate:core
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: classify route changes before manual queue send"
          git push origin HEAD:fix/queue-readiness-wakeup
