name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v1-open-source
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Publish validated lifecycle product files
        shell: bash
        run: |
          set -euo pipefail
          python .apply-v1-lifecycle.py
          npm run validate
          npm run package
          git diff --check
          rm -rf dist

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config.js background.js tests/background.test.js tests/manifest.test.js
          git diff --cached --check
          git commit -m "Wire v1 version parity and first-install onboarding"
          git push origin HEAD:release/v1-open-source
