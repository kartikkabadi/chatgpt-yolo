name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/command-viability
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply and validate truthful command semantics
        shell: bash
        run: |
          set -uo pipefail
          set +e
          (
            set -euo pipefail
            python .yolo-command-viability.py
            python .yolo-command-viability-followup.py
            git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
            rm -f .yolo-command-viability.py .yolo-command-viability-followup.py .yolo-command-viability-error.txt
            npm run validate
            npm run package
            git diff --check
          ) > /tmp/yolo-command-viability.log 2>&1
          status=$?
          set -e
          cat /tmp/yolo-command-viability.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ $status -ne 0 ]]; then
            tail -n 220 /tmp/yolo-command-viability.log > .yolo-command-viability-error.txt
            git add .yolo-command-viability-error.txt
            git commit -m "Capture command viability failure" || true
            git push origin HEAD:fix/command-viability
            exit "$status"
          fi
          git add -A
          git diff --cached --check
          git commit -m "Make slash actions truthful and fail closed"
          git push origin HEAD:fix/command-viability
