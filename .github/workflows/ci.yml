name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/codex-command-workflows
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply final command workflow self-review fix
        shell: bash
        run: |
          set -uo pipefail
          : > /tmp/command-final-self-review.log

          if [[ -f .apply-command-final-self-review.ready ]]; then
            set +e
            (
              set -euo pipefail
              python .apply-command-final-self-review.py
              npm run validate
              git diff --check
            ) 2>&1 | tee /tmp/command-final-self-review.log
            status=${PIPESTATUS[0]}
            set -e

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            if [[ $status -ne 0 ]]; then
              cp /tmp/command-final-self-review.log .command-final-self-review.error.txt
              git add .command-final-self-review.error.txt
              git commit -m "Capture final command workflow self-review failure"
              git push origin HEAD:feature/codex-command-workflows
              exit "$status"
            fi

            cat > .github/workflows/ci.yml <<'YAML'
          name: CI

          on:
            pull_request:
            push:
              branches:
                - main

          permissions:
            contents: read

          jobs:
            validate:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 20
                - run: npm run validate
          YAML

            rm -f .apply-command-final-self-review.py .apply-command-final-self-review.ready .command-final-self-review.error.txt
            git add -A
            git diff --cached --check
            git commit -m "Fix fast-response workflow baseline race"
            git push origin HEAD:feature/codex-command-workflows
          else
            npm run validate
          fi
