name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rebuild/data-portability-main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Rebuild reviewed portability delta on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin feature/data-portability main
          files=(
            CHANGELOG.md
            PRIVACY.md
            README.md
            background-wrapper.js
            data-background.js
            docs/DATA_PORTABILITY.md
            manifest.json
            options-portability.js
            options-ui.js
            package.json
            portability.js
            scripts/package.mjs
            tests/data-background.test.js
            tests/options-portability.test.js
            tests/portability-integration.test.js
            tests/portability.test.js
          )
          for file in "${files[@]}"; do
            mkdir -p "$(dirname "$file")"
            git show "origin/feature/data-portability:$file" > "$file"
          done
          python .yolo-portability-rebuild.py
          npm run validate
          npm run package
          git diff --check

          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .yolo-portability-rebuild.py
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add safe data portability with final review fixes"
          git push origin HEAD:rebuild/data-portability-main
