name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: hardening/reliability-foundation
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Apply, validate, and publish reliability foundation
        shell: bash
        run: |
          set -euo pipefail
          python .reliability-foundation.py
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .reliability-foundation.py .reliability-patch.*
          npm run validate
          npm run package
          git diff --check
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Harden automation delivery and cross-tab coordination"
          git push origin HEAD:hardening/reliability-foundation
