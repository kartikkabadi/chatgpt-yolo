name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: hardening/portable-transactions
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Apply and validate portable transaction boundary
        shell: bash
        run: |
          set -uo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          fail() {
            stage="$1"
            output="${2:-}"
            git restore .github/workflows/ci.yml .portable-transactions-core.py .portable-transactions-tests.py .portable-transactions-fixes.py 2>/dev/null || true
            {
              echo "Failed stage: ${stage}"
              [[ -n "$output" && -f "$output" ]] && tail -n 260 "$output"
            } > .portable-transactions-error.txt
            git add .portable-transactions-error.txt
            git commit -m "Capture portable transaction failure at ${stage}" || true
            git push origin HEAD:hardening/portable-transactions
            exit 1
          }

          python .portable-transactions-core.py > /tmp/core.log 2>&1 || fail core /tmp/core.log
          python .portable-transactions-tests.py > /tmp/tests.log 2>&1 || fail tests /tmp/tests.log
          python .portable-transactions-fixes.py > /tmp/fixes.log 2>&1 || fail fixes /tmp/fixes.log
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml || fail restore-ci
          rm -f .portable-transactions-core.py .portable-transactions-tests.py .portable-transactions-fixes.py .portable-transactions-error.txt
          npm run validate > /tmp/validate.log 2>&1 || fail validate /tmp/validate.log
          npm run package > /tmp/package.log 2>&1 || fail package /tmp/package.log
          git diff --check > /tmp/diff.log 2>&1 || fail diff-check /tmp/diff.log
          git add -A
          git diff --cached --check || fail staged-diff
          git commit -m "Serialize portable data through one transaction boundary" || fail commit
          git push origin HEAD:hardening/portable-transactions || fail push
