name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/command-viability
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply and validate truthful command semantics
        shell: bash
        run: |
          set -euo pipefail
          python .yolo-command-viability.py
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .yolo-command-viability.py
          npm run validate
          npm run package
          git diff --check
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Make slash actions truthful and fail closed"
          git push origin HEAD:fix/command-viability
