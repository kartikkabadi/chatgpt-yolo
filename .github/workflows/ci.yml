name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: hardening/reliability-foundation
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Apply and validate final reliability corrections
        shell: bash
        run: |
          set -uo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          fail() {
            stage="$1"
            output="${2:-}"
            git restore .github/workflows/ci.yml .reliability-followup.py 2>/dev/null || true
            {
              echo "Failed stage: ${stage}"
              [[ -n "$output" && -f "$output" ]] && tail -n 240 "$output"
            } > .reliability-followup-error.txt
            git add .reliability-followup-error.txt
            git commit -m "Capture final reliability failure at ${stage}" || true
            git push origin HEAD:hardening/reliability-foundation
            exit 1
          }

          python - <<'PY'
          from pathlib import Path
          path = Path('.reliability-followup.py')
          source = path.read_text(encoding='utf-8')
          needle = "    '''  function actionDedupeKey"
          if source.count(needle) != 2:
              raise RuntimeError('Expected two actionDedupeKey source blocks')
          path.write_text(source.replace(needle, "    r'''  function actionDedupeKey"), encoding='utf-8')
          PY
          python .reliability-followup.py > /tmp/followup.log 2>&1 || fail followup /tmp/followup.log
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml || fail restore-ci
          rm -f .reliability-followup.py .reliability-followup-error.txt
          npm run validate > /tmp/validate.log 2>&1 || fail validate /tmp/validate.log
          npm run package > /tmp/package.log 2>&1 || fail package /tmp/package.log
          git diff --check > /tmp/diff.log 2>&1 || fail diff-check /tmp/diff.log
          git add -A
          git diff --cached --check || fail staged-diff
          git commit -m "Close final reliability review gaps" || fail commit
          git push origin HEAD:hardening/reliability-foundation || fail push
