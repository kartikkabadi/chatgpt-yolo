name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v1-open-source
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply reviewed UI integration
        shell: bash
        run: |
          set -uo pipefail
          : > /tmp/release-ui.log

          if [[ -f .apply-release-ui.ready ]]; then
            set +e
            (
              set -euo pipefail
              python .apply-release-ui.py
              npm run validate
              git diff --check
            ) 2>&1 | tee /tmp/release-ui.log
            status=${PIPESTATUS[0]}
            set -e

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            if [[ $status -ne 0 ]]; then
              cp /tmp/release-ui.log .release-ui.error.txt
              git add .release-ui.error.txt
              git commit -m "Capture v1 UI integration failure"
              git push origin HEAD:release/v1-open-source
              exit "$status"
            fi

            cat > .github/workflows/ci.yml <<'YAML'
          name: CI

          on:
            pull_request:
            push:
              branches:
                - main

          permissions:
            contents: read

          jobs:
            validate:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 20
                - run: npm run validate
          YAML

            rm -f .apply-release-ui.py .apply-release-ui.ready .release-ui.error.txt
            git add -A
            git diff --cached --check
            git commit -m "Complete reviewed UI integration for v1"
            git push origin HEAD:release/v1-open-source
          else
            npm run validate
          fi
