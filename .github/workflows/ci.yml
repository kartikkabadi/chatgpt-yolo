name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 24
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
      - name: Check JavaScript syntax
        run: npm run check
      - name: Run test suite
        run: node --test --test-reporter=dot
      - name: Verify extension boundary
        run: npm run verify:extension
      - name: Verify package contents
        run: node scripts/package.mjs --check

  package:
    name: Package extension
    needs:
      - validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm run package
      - uses: actions/upload-artifact@v7
        with:
          name: yolo-preview
          path: dist/yolo
          if-no-files-found: error
          retention-days: 7
