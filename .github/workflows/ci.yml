name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: hardening/overnight-multitab
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Apply and validate overnight multi-tab hardening
        shell: bash
        run: |
          set -uo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          fail() {
            stage="$1"
            output="${2:-}"
            git restore .github/workflows/ci.yml .overnight-hardening.py 2>/dev/null || true
            {
              echo "Failed stage: ${stage}"
              [[ -n "$output" && -f "$output" ]] && tail -n 300 "$output"
            } > .overnight-hardening-error.txt
            git add .overnight-hardening-error.txt
            git commit -m "Capture overnight hardening failure at ${stage}" || true
            git push origin HEAD:hardening/overnight-multitab
            exit 1
          }

          python .overnight-hardening.py > /tmp/patch.log 2>&1 || fail patch /tmp/patch.log
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml || fail restore-ci
          rm -f .overnight-hardening.py .overnight-hardening-error.txt
          npm run validate > /tmp/validate.log 2>&1 || fail validate /tmp/validate.log
          npm run package > /tmp/package.log 2>&1 || fail package /tmp/package.log
          git diff --check > /tmp/diff.log 2>&1 || fail diff-check /tmp/diff.log
          git add -A
          git diff --cached --check || fail staged-diff
          git commit -m "Harden overnight multi-tab workflows" || fail commit
          git push origin HEAD:hardening/overnight-multitab || fail push
