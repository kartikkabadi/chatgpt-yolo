name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v1-open-source
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Capture lifecycle diagnostic without publishing product changes
        shell: bash
        run: |
          set -uo pipefail
          : > /tmp/v1-lifecycle.log
          set +e
          (
            set -euo pipefail
            python .apply-v1-lifecycle.py
            npm run validate
            npm run package
            git diff --check
          ) 2>&1 | tee /tmp/v1-lifecycle.log
          status=${PIPESTATUS[0]}
          set -e

          {
            echo "exit_status=$status"
            echo
            tail -n 220 /tmp/v1-lifecycle.log
          } > .v1-lifecycle-diagnostic.txt

          git restore config.js background.js tests/background.test.js tests/manifest.test.js 2>/dev/null || true
          rm -rf dist
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .v1-lifecycle-diagnostic.txt
          git commit -m "Capture exact v1 lifecycle diagnostic"
          git push origin HEAD:release/v1-open-source
