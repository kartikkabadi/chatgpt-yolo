name: Bug report
description: Report a reproducible YOLO defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include private conversation content, credentials, or tokens.
  - type: input
    id: version
    attributes:
      label: YOLO version or commit
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and visible error text
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I reloaded the extension and refreshed ChatGPT.
          required: true
        - label: This is not a security vulnerability.
          required: true
