<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YOLO</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">AUTOMATION QUEUE</div>
          <h1>YOLO</h1>
          <p id="scope">Current conversation</p>
        </div>
        <label class="master-switch" title="Run automation for this conversation">
          <input id="enabled" type="checkbox" role="switch">
          <span></span>
        </label>
      </header>

      <section class="status-strip" aria-label="Status">
        <span id="status" class="status-pill">Loading</span>
        <label class="profile-control">
          <span>Profile</span>
          <select id="profile">
            <option value="safe">Safe</option>
            <option value="balanced">Balanced</option>
            <option value="fast">Fast</option>
            <option value="custom">Custom</option>
          </select>
        </label>
        <span id="queueCount" class="queue-count">0 queued</span>
      </section>

      <section class="composer-card">
        <textarea id="message" rows="4" maxlength="8000" placeholder="Queue a message for this conversation…"></textarea>
        <div class="template-row">
          <select id="templateSelect" aria-label="Message template">
            <option value="">Template…</option>
          </select>
          <button id="manageTemplates" class="ghost" type="button">Manage</button>
        </div>
        <div class="composer-actions">
          <button id="addQueue" class="primary" type="button">Add to queue</button>
          <button id="addAndSend" type="button">Add &amp; send</button>
          <button id="cancelEdit" class="ghost" type="button" hidden>Cancel edit</button>
        </div>
        <p id="composeStatus" class="inline-status" aria-live="polite"></p>
      </section>

      <section class="queue-card" aria-label="Message queue">
        <div class="section-heading">
          <div>
            <strong>Queue</strong>
            <small>Drag to reorder. Messages send only when the chat is idle.</small>
          </div>
          <div class="queue-actions">
            <button id="togglePause" class="ghost" type="button">Pause</button>
            <button id="sendNext" class="ghost" type="button">Send next</button>
            <button id="clearQueue" class="ghost danger" type="button">Clear</button>
          </div>
        </div>
        <div id="emptyQueue" class="empty-state">Nothing queued.</div>
        <ol id="queueList" class="queue-list"></ol>
      </section>

      <details class="activity-card">
        <summary>
          <span><strong>Activity</strong><small id="lastAction">No activity yet</small></span>
          <span id="blockedReason" class="warning-dot" hidden title="Automation is blocked">!</span>
        </summary>
        <div class="activity-body">
          <div class="metrics">
            <p><span id="sessionActions">0</span><small>session actions</small></p>
            <p><span id="hourlyActions">0</span><small>last hour</small></p>
            <p><span id="nextSend">—</span><small>next queue send</small></p>
          </div>
          <p id="blockedText" class="notice" hidden></p>
          <ul id="eventList" class="event-list"></ul>
        </div>
      </details>

      <footer>
        <button id="advanced" class="link-button" type="button">Advanced settings</button>
        <span id="version"></span>
      </footer>
    </main>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
